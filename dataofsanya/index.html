<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Responses — Ruta & Anant Silver Jubilee</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ivory: #F8F3E8;
      --brown: #2C1A10;
      --green: #5C7A3E;
      --gold:  #C9A96E;
    }
    body {
      background: var(--ivory);
      color: var(--brown);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--brown);
      margin-bottom: 6px;
    }
    header p {
      font-size: 0.85rem;
      color: var(--green);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .gold-rule {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 14px auto;
    }
    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .stat-box {
      background: white;
      border: 1px solid rgba(92,122,62,0.2);
      border-radius: 12px;
      padding: 16px 28px;
      text-align: center;
      min-width: 120px;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--green);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.6;
      margin-top: 4px;
    }
    .table-wrap {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(44,26,16,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: var(--green);
      color: white;
    }
    thead th {
      padding: 14px 18px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: left;
      font-weight: 700;
    }
    tbody tr {
      border-bottom: 1px solid rgba(92,122,62,0.1);
      transition: background 0.2s;
    }
    tbody tr:hover { background: rgba(92,122,62,0.04); }
    tbody td {
      padding: 13px 18px;
      font-size: 0.9rem;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .badge-yes      { background: rgba(92,122,62,0.15);  color: #3a6020; }
    .badge-no       { background: rgba(180,60,60,0.12);  color: #a03030; }
    .badge-maybe    { background: rgba(201,169,110,0.2); color: #7a5a20; }
    #loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 0.95rem;
      color: var(--green);
      letter-spacing: 0.1em;
    }
    #error-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #a03030;
      font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
      tbody td { padding: 12px 12px; font-size: 0.82rem; }
      thead th { padding: 12px 12px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Ruta &amp; Anant — Silver Jubilee</h1>
  <div class="gold-rule"></div>
  <p>RSVP Responses</p>
</header>

<div class="stats">
  <div class="stat-box"><div class="stat-num" id="count-total">—</div><div class="stat-label">Total</div></div>
  <div class="stat-box"><div class="stat-num" id="count-yes">—</div><div class="stat-label">Attending</div></div>
  <div class="stat-box"><div class="stat-num" id="count-no">—</div><div class="stat-label">Not Attending</div></div>
  <div class="stat-box"><div class="stat-num" id="count-guests">—</div><div class="stat-label">Total Guests</div></div>
</div>

<div class="table-wrap">
  <div id="loading">Loading responses…</div>
  <div id="error-msg">Could not load data. Check Apps Script URL.</div>
  <table id="rsvp-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Attending</th>
        <th>Guests</th>
        <th>Submitted</th>
      </tr>
    </thead>
    <tbody id="rsvp-tbody"></tbody>
  </table>
</div>

<script>
  // ← Paste your deployed Apps Script URL here
  const APPS_SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';

  async function loadData() {
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!data.length) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading').textContent = 'No responses yet.';
        return;
      }

      let yes = 0, no = 0, guests = 0;
      const tbody = document.getElementById('rsvp-tbody');

      data.forEach((row, i) => {
        const att = (row.attendance || '').toLowerCase();
        if (att === 'yes') yes++;
        if (att === 'no')  no++;
        guests += parseInt(row.guests) || 0;

        const tr = document.createElement('tr');
        const date = row.timestamp ? new Date(row.timestamp).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td><strong>${row.name || '—'}</strong></td>
          <td><span class="badge badge-${att}">${att || '—'}</span></td>
          <td>${row.guests || 1}</td>
          <td style="font-size:0.8rem;opacity:0.65">${date}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('count-total').textContent  = data.length;
      document.getElementById('count-yes').textContent    = yes;
      document.getElementById('count-no').textContent     = no;
      document.getElementById('count-guests').textContent = guests;

      document.getElementById('rsvp-table').style.display = 'table';
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  loadData();
</script>

</body>
</html>
